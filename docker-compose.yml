volumes:
  n8n_storage:
  postgres_storage:
  ollama_storage:
  qdrant_storage:
  searxng_storage:

networks:
  demo:

services:
  postgres:
    image: postgres:16-alpine
    networks: ['demo']
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_storage:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    networks: ['demo']
    restart: unless-stopped
    ports:
      - 11434:11434
    volumes:
      - ollama_storage:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    networks: ['demo']
    restart: unless-stopped
    ports:
      - 5678:5678
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - OLLAMA_HOST=ollama:11434
    volumes:
      - n8n_storage:/home/node/.n8n
    depends_on:
      - postgres

  qdrant:
    image: qdrant/qdrant
    container_name: qdrant
    networks: ['demo']
    restart: unless-stopped
    ports:
      - 6333:6333
    volumes:
      - qdrant_storage:/qdrant/storage

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    networks: ['demo']
    ports:
      - "8888:8080" # <-- Changed from 8080 to 8888 to avoid conflict
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    networks: ['demo']
    ports:
      - "8080:8080" # <-- Takes over port 8080 natively
    volumes:
      # Mounts your local settings.yml folder directly inside the container
      - ./searxng:/etc/searxng
      - searxng_storage:/etc/searxng/data